services:
  penguins-gateway:
    image: ${PENGUINS_IMAGE:-penguins:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      PENGUINS_GATEWAY_TOKEN: ${PENGUINS_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${PENGUINS_CONFIG_DIR}:/home/node/.penguins
      - ${PENGUINS_WORKSPACE_DIR}:/home/node/.penguins/workspace
    ports:
      - "${PENGUINS_GATEWAY_PORT:-18789}:18789"
      - "${PENGUINS_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${PENGUINS_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  penguins-cli:
    image: ${PENGUINS_IMAGE:-penguins:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      PENGUINS_GATEWAY_TOKEN: ${PENGUINS_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${PENGUINS_CONFIG_DIR}:/home/node/.penguins
      - ${PENGUINS_WORKSPACE_DIR}:/home/node/.penguins/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
