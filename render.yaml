services:
  - type: web
    name: penguins
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: PENGUINS_STATE_DIR
        value: /data/.penguins
      - key: PENGUINS_WORKSPACE_DIR
        value: /data/workspace
      - key: PENGUINS_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: penguins-data
      mountPath: /data
      sizeGB: 1
